<ion-header>
  <ion-toolbar>
    <ion-title>Agregar noticia</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

<ion-item>
    <ion-input label="Default input"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Fecha</ion-label>
    <ion-datetime displayFormat="DD/MM/YYYY" [(ngModel)]="fecha"></ion-datetime>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Descripción</ion-label>
    <ion-textarea [(ngModel)]="descripcion"></ion-textarea>
  </ion-item>

  <ion-button expand="full" (click)="guardarNoticia()">
    Agregar noticia
  </ion-button>

</ion-content>
